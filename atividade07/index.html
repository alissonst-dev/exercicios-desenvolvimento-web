<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade Bootstrap</title>
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container mt-3">
    <div class="row">
      <div class="col text-bg-info p-2">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
          Abrir Modal
        </button>
      </div>
      <div class="col text-bg-danger p-2">
        <div class="card custom-card">
          <img src="https://placehold.co/150x100" class="card-img-top img-fluid" alt="Imagem">

          <div class="card-body">
            <h5 class="card-title text-uppercase text-primary fw-bold">
              Título do Card
            </h5>

            <p class="card-text fs-6 text-decoration-underline">
              Este é um exemplo de texto no corpo do card.
            </p>
          </div>
        </div>
      </div>
      <div class="col d-none d-md-block text-bg-warning p-2">
        <p>Terceira Coluna (Oculta em XS e SM)</p>
        <div class="d-flex justify-content-between">
          <button class="btn btn-success btn-sm">Botão 1</button>
          <button class="btn btn-danger btn-sm">Botão 2</button>
          <button class="btn btn-warning btn-sm">Botão 3</button>
          <button class="btn btn-info btn-sm">Botão 4</button>
          <button class="btn btn-dark btn-sm">Botão 5</button>
        </div>
      </div>
    </div>

   
    <div class="row">
      <div class="col-12 text-bg-secondary p-2">
        Coluna Única da Segunda Linha

        <div class="fs-3">
          <i class="bi bi-alarm"></i>
          <i class="bi bi-bell"></i>
          <i class="bi bi-calendar"></i>
          <i class="bi bi-house"></i>
          <i class="bi bi-github"></i>
        </div>
      </div>
    </div>

   
    <div class="row">
      <div class="col-md-4 offset-md-2 text-bg-info">
        Coluna com Offset
      </div>

      <div class="col-md-4 order-md-3 text-bg-danger">
        Coluna com Ordem 3
      </div>

      <div class="col-md-4 order-md-1 text-bg-warning">
        Coluna com Ordem 1
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Título do Modal</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          Este é o conteúdo do modal.
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Fechar
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
